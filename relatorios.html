<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <!-- ── HEADER ── -->
  <header class="anim d1">
    <div class="logo-area">
      <svg class="logo-mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00d4ff"/>
            <stop offset="100%" stop-color="#2d6ef5"/>
          </linearGradient>
        </defs>
        <rect width="48" height="48" rx="13" fill="url(#lg1)" opacity="0.15"/>
        <rect width="48" height="48" rx="13" fill="none" stroke="url(#lg1)" stroke-width="1.2" opacity="0.6"/>
        <path d="M24 10L8 17l16 7 16-7-16-7z" fill="url(#lg1)" opacity="0.9"/>
        <path d="M14 21v8c0 2.8 4.5 5 10 5s10-2.2 10-5v-8" stroke="url(#lg1)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
        <line x1="40" y1="17" x2="40" y2="26" stroke="url(#lg1)" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="40" cy="27" r="1.5" fill="url(#lg1)"/>
      </svg>
      <div class="logo-text">
        <h1>Supletivo do Norte</h1>
        <span>Relatórios de Marketing · 2026</span>
      </div>
    </div>
  </header>

  <!-- ── NAV ── -->
  <nav class="main-nav anim d2">
    <a href="index.html" class="nav-link">📊 Dashboard</a>
    <a href="relatorios.html" class="nav-link active">📈 Relatórios</a>
  </nav>

  <!-- ── REPORTEI ── -->
  <div class="report-card anim d3">
    <div class="report-card-header">
      <div class="chart-title">📈 Relatório de Redes Sociais</div>
      <div class="chart-sub">Dados via Reportei · Instagram & Facebook · Supletivo do Norte</div>
    </div>
    <div class="report-iframe-wrap">
      <iframe
        title="Relatório Supletivo do Norte"
        src="https://app.reportei.com/embed/76V9Ya5YfQpvOkSsnW2mDBTiqnesYghi"
        allowfullscreen
        loading="lazy"
      ></iframe>
    </div>
  </div>

  <footer>
    Supletivo do Norte · Relatórios via Reportei ·
    <a href="index.html">Voltar ao Dashboard</a>

</div>
